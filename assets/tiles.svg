<svg xmlns="http://www.w3.org/2000/svg" width="256" height="32">
  <!-- 플랫 단색 타일 (점 장식 제거). 색은 Resurrect-64 팔레트. 스프라이트는 추후 추가 -->
  <!-- 0: grass light (slime zone) -->
  <rect x="0" y="0" width="32" height="32" fill="#91db69"/>
  <!-- 1: grass mid (bat zone) -->
  <rect x="32" y="0" width="32" height="32" fill="#1ebc73"/>
  <!-- 2: grass dark / forest (elite zone) -->
  <rect x="64" y="0" width="32" height="32" fill="#239063"/>
  <!-- 3: village floor -->
  <rect x="96" y="0" width="32" height="32" fill="#ab947a"/>
  <!-- 4: path -->
  <rect x="128" y="0" width="32" height="32" fill="#fbb954"/>
  <!-- 5: water -->
  <rect x="160" y="0" width="32" height="32" fill="#4d9be6"/>
  <!-- 6: mountain -->
  <rect x="192" y="0" width="32" height="32" fill="#9babb2"/>
  <!-- 7: bridge -->
  <rect x="224" y="0" width="32" height="32" fill="#cd683d"/>
</svg>
